---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ci-runner
  namespace: build
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ci-runner
  template:
    metadata:
      labels:
        app: ci-runner
    spec:
      serviceAccountName: ci
      containers:
        - name: runner
          image: alpine:3.19
          command: ["sh", "-c", "sleep 3600"]
---
apiVersion: v1
kind: Pod
metadata:
  name: debug-pod
  namespace: prod
spec:
  containers:
    - name: debug
      image: alpine:3.19
      command: ["sh", "-c", "sleep 3600"]
