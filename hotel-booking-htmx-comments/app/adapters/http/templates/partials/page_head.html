<!-- Общий head: стили, HTMX и базовая разметка страницы. -->
{{ define "page_head" }}
<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #fff;
      --line: #d9dce5;
      --text: #1f2937;
      --muted: #6b7280;
      --blue: #2563eb;
      --ok: #166534;
      --warn: #92400e;
      --bad: #991b1b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 16px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero,
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px;
    }

    .hero {
      margin-bottom: 18px;
      background: linear-gradient(135deg, #e0ecff, #f8fbff);
    }

    .layout {
      display: grid;
      gap: 18px;
      grid-template-columns: 1.2fr 0.8fr;
      align-items: start;
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .full {
      grid-column: 1 / -1;
    }

    .meta {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin: 14px 0;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 14px;
    }

    input,
    button {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      font-size: 15px;
      background: #fff;
    }

    button,
    a.btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      text-decoration: none;
      font-weight: 600;
      border-color: var(--blue);
      background: var(--blue);
      color: #fff;
    }

    a.btn.secondary,
    button.secondary {
      background: #fff;
      color: var(--blue);
    }

    a.btn.danger,
    button.danger {
      background: #fff;
      color: var(--bad);
      border-color: #ef4444;
    }

    .list {
      display: grid;
      gap: 14px;
    }

    .muted {
      color: var(--muted);
    }

    .pill {
      display: inline-flex;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      background: #dbeafe;
      color: var(--blue);
    }

    .pill.ok {
      background: #dcfce7;
      color: var(--ok);
    }

    .pill.warn {
      background: #fef3c7;
      color: var(--warn);
    }

    .pill.bad {
      background: #fee2e2;
      color: var(--bad);
    }

    .box-error {
      background: #fee2e2;
      border-color: #fecaca;
      color: #7f1d1d;
    }

    .box-note {
      background: #f8fafc;
    }

    .box-ok {
      background: #dcfce7;
      border-color: #bbf7d0;
      color: var(--ok);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .actions form,
    .actions a {
      flex: 1 1 180px;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      word-break: break-all;
    }

    .htmx-indicator {
      opacity: 0;
      transition: opacity .2s;
      color: var(--muted);
    }

    .htmx-request .htmx-indicator,
    .htmx-request.htmx-indicator {
      opacity: 1;
    }

    @media (max-width: 900px) {
      .layout,
      .grid,
      .meta {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="container">
{{ end }}
